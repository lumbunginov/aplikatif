      floatWA.href = waLink;

        fbq('track', 'ViewContent', {content_type: 'app_detail', content_name: app.nama});
      }

      var related = APPS_DATA.filter(function(a) {
        return a.slug !== slug && a.kategori === app.kategori;

          + '<p class="text-gray-500 text-xs">' + r.deskripsi_singkat + '</p>'
